<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cell Division — BioAnimate</title>
  <link rel="stylesheet" href="../../style.css" />
  <style>
    .anim-page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    .anim-header {
      margin-bottom: 1.6rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .anim-title-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.3rem;
    }

    .anim-icon { font-size: 2rem; line-height: 1; }

    h1.anim-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      color: #fff;
    }

    .anim-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-left: 2.8rem;
    }

    /* Canvas */
    .canvas-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 1.4rem;
    }

    #bio-canvas {
      display: block;
      width: 100%;
    }

    /* Stage panel */
    .stage-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1.2rem;
    }

    .stage-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .stage-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    h2.stage-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
    }

    .progress-badge {
      flex-shrink: 0;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.75rem;
      white-space: nowrap;
    }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .stage-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      white-space: pre-line;
    }

    /* Controls */
    .anim-controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .ctrl-btn {
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
    }

    .ctrl-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .ctrl-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .ctrl-btn--primary {
      background: var(--accent);
      color: #0a0f1e;
      border-color: var(--accent);
    }

    .ctrl-btn--primary:hover:not(:disabled) {
      background: #2ecc87;
      border-color: #2ecc87;
      color: #0a0f1e;
    }

    .keyboard-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="../../index.html">🧬 BioAnimate</a>
    <ul class="nav-links">
      <li><a href="../../index.html#topics">Topics</a></li>
      <li><a href="../../index.html#about">About</a></li>
    </ul>
  </nav>

  <main class="anim-page">

    <div class="anim-header">
      <a class="back-link" href="../../index.html">&#8592; Back to Topics</a>
      <div class="anim-title-row">
        <span class="anim-icon">🔬</span>
        <h1 class="anim-title">Cell Division</h1>
      </div>
      <p class="anim-subtitle">Mitosis &amp; Meiosis I — step by step</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="bio-canvas"></canvas>
    </div>

    <div class="stage-panel">
      <div class="stage-header">
        <div>
          <div class="stage-tag" id="stage-tag">Interphase</div>
          <h2 class="stage-name" id="stage-name">G1 — Cell Growth</h2>
        </div>
        <span class="progress-badge" id="progress">1 / 11</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="stage-desc" id="stage-desc"></p>
    </div>

    <div class="anim-controls">
      <button class="ctrl-btn" id="btn-prev">&#8592; Previous</button>
      <button class="ctrl-btn ctrl-btn--primary" id="btn-next">Next &#8594;</button>
    </div>
    <p class="keyboard-hint">Tip: use ← → arrow keys to navigate</p>

  </main>

  <script src="animation.js"></script>
</body>
</html>
